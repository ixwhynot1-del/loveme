<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Биение сердца из текста</title>
    <style>
        body {
            margin: 0;
            background-color: #050520; /* Темно-синий фон */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    // Устанавливаем размер холста
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const words = "I love you";
    const totalPoints = 80; // Кол-во надписей по контуру

    // Параметры анимации
    let time = 0;

    function animate() {
        requestAnimationFrame(animate); // Запускает цикл анимации
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Очищаем холст каждый кадр
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2 - 20;

        // --- ЛОГИКА ДВИЖЕНИЯ ---
        // 1. Биение: scale меняется синусоидально со временем
        // Базовый размер 18, плюс-минус 1.5. Скорость биения (время) увеличена (* 0.05)
        const baseScale = 18;
        const pulse = Math.sin(time * 0.05) * 1.5; 
        const scale = baseScale + pulse;

        // 2. Мерцание: прозрачность немного меняется
        const opacity = 0.8 + Math.sin(time * 0.1) * 0.2; // От 0.6 до 1.0

        ctx.fillStyle = `rgba(255, 77, 109, ${opacity})`; // Розово-красный с прозрачностью
        ctx.font = "bold 14px Arial";
        ctx.textAlign = "center";

        for (let i = 0; i < totalPoints; i++) {
            let t = (i / totalPoints) * Math.PI * 2;
            
            // Математика сердца
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));

            // Позиционирование
            let posX = centerX + x * scale;
            let posY = centerY + y * scale;

            // Отрисовка
            ctx.save();
            ctx.translate(posX, posY);
            ctx.rotate(t + Math.PI / 2); // Поворот текста по контуру
            ctx.fillText(words, 0, 0);
            ctx.restore();
        }

        time++; // Увеличиваем время для следующего кадра
    }

    animate(); // Запуск

</script>

</body>
</html>
